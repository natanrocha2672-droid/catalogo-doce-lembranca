server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # Isto resolve o erro de rotas do React
        try_files $uri $uri/ /index.html;
    }

    # Assegura que ficheiros JavaScript são enviados com o tipo MIME correto
    location ~ \.jsx?$ {
        root   /usr/share/nginx/html;
        add_header Content-Type application/javascript;
    }
    
    # Adicionalmente, caso precise para ficheiros JS normais após o build
    location ~ \.js$ {
        root   /usr/share/nginx/html;
        add_header Content-Type application/javascript;
    }

    # Lida com erros
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
